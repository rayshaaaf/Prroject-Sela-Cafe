server.port=8081

spring.application.name=core-service

spring.datasource.url=jdbc:postgresql://localhost:5433/db_cafe
spring.datasource.username=postgres
spring.datasource.password=YOURPASS

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=YOURSECRET
jwt.expiration.customer=86400000 
jwt.expiration.staff=28800000

logging.level.org.springframework.security=DEBUG

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUREMAIL
spring.mail.password=YOURPASS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.owner.email=YOUREMAIL