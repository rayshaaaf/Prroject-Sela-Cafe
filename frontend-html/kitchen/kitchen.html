<body class="font-body-md text-on-background min-h-screen overflow-hidden flex">

<div class="h-4 w-[1px] bg-outline-variant/50"></div>
<div class="font-label-md text-label-md text-on-surface-variant opacity-60" id="live-clock">--:--:--</div>
</div>
<div class="flex items-center gap-4">

</div>

</div>
</div>
<div class="flex-1 space-y-4 overflow-y-auto pr-2 pb-8" id="col-incoming">
<!-- Cards injected here -->
</div>
</div>

</div>
</div>

<!-- Cards injected here -->
</div>

</div>
</div>
<div class="flex-1 space-y-4 overflow-y-auto pr-2 pb-8" id="col-ready">
<!-- Cards injected here -->
</div>
</div>
</section>
