                "tertiary-fixed": "#ece2c9",
                "on-error-container": "#93000a",
                "surface-tint": "#725a42",
                "tertiary-fixed-dim": "#cfc6ae",
                "primary-fixed": "#feddbe",
                "on-surface-variant": "#4e453d",
                "inverse-primary": "#e1c1a3",
                "surface-container": "#efeeea",
                "on-secondary-fixed-variant": "#2f4d39",
                "primary-container": "#33210d",
                "surface-container-low": "#f4f4f0",
                "outline-variant": "#d2c4b9",
                "on-tertiary": "#ffffff",
                "on-primary-fixed": "#291805",
                "secondary": "#46654f",
                "outline": "#80756c",
                "outline-muted": "rgba(128, 117, 108, 0.2)",
                "primary-fixed-dim": "#e1c1a3",

    <style>
        .sela-line { height: 1px; background-color: rgba(128, 117, 108, 0.2); }
        .grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden">
    <div class="grain"></div>
    
    <div class="flex min-h-screen">
        <aside class="h-screen w-64 fixed left-0 top-0 bg-surface-container-low border-r border-outline-variant/50 flex flex-col py-6 px-4 gap-4 z-40 hidden md:flex">
            <div class="flex items-center gap-3 px-2 mb-8">
                <div class="w-10 h-10 bg-deep-espresso rounded-lg flex items-center justify-center text-heritage-cream">
                    <span class="material-symbols-outlined">coffee</span>
                </div>
                <div>
                    <h1 class="font-headline-sm text-headline-sm font-bold text-primary">Sela Cafe</h1>
                    <p class="font-label-caps text-[10px] text-on-surface-variant tracking-widest opacity-70">PREMIUM MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex-1 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform group" href="dashboard.html">
                    <span class="material-symbols-outlined">dashboard</span><span class="font-label-caps text-label-caps">Overview</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 bg-secondary-container text-on-secondary-container rounded-lg font-bold transition-transform group" href="manage-menu.html">
                    <span class="material-symbols-outlined">restaurant</span><span class="font-label-caps text-label-caps">Menu</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform group" href="performance.html">
                    <span class="material-symbols-outlined">monitoring</span><span class="font-label-caps text-label-caps">Performance</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform group" href="manage-promo.html">
                    <span class="material-symbols-outlined">percent</span><span class="font-label-caps text-label-caps">Promo</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform group" href="manage-career.html">
                    <span class="material-symbols-outlined">work_outline</span><span class="font-label-caps text-label-caps">Careers</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform group" href="manage-location.html">
                    <span class="material-symbols-outlined">location_on</span><span class="font-label-caps text-label-caps">Locations</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform group" href="manage-user.html">
                    <span class="material-symbols-outlined">person</span><span class="font-label-caps text-label-caps">Users</span>
                </a>
            </nav>
            <div class="mt-auto space-y-1">
                <a class="flex items-center gap-3 px-3 py-2.5 text-on-surface-variant hover:bg-surface-variant/50 rounded-lg transition-transform duration-200 active:opacity-80 group" href="#">
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">settings</span>
                    <span class="font-label-caps text-label-caps">Settings</span>
                </a>
                <button onclick="window.logout()" class="w-full mt-4 bg-deep-espresso text-paper-white py-3 px-4 rounded-lg font-label-caps text-[12px] flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all cursor-pointer">
                    <span class="material-symbols-outlined text-[18px]">logout</span> Log Out
                </button>
            </div>
        </aside>

        <main class="flex-1 md:ml-64 relative bg-paper-white">
            <header class="sticky top-0 w-full h-16 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center px-6 md:px-8 z-30">
                <div class="flex items-center gap-4">
                    <a href="manage-menu.html" class="p-2 hover:bg-on-surface/5 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-xl">arrow_back</span>
                    </a>
                    <h2 class="font-headline-md text-headline-md font-bold text-primary">Edit Menu Curation</h2>
                </div>
            </header>

            <div class="max-w-2xl mx-auto p-6 md:p-10">
                <form id="edit-menu-form" class="space-y-8 bg-white border border-outline-variant/40 p-8 rounded-xl shadow-xs">
                    
                    <div class="space-y-2">
                        <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-name">Product Name</label>
                        <input id="menu-name" name="name" required class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 p-3 text-sm font-body-md" placeholder="e.g. Signature Iced Latte" type="text"/>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-category">Category</label>
                            <select id="menu-category" name="category" required class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 p-3 text-sm font-body-md cursor-pointer">
                                <option value="" disabled selected>Loading categories...</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-ingredient">Core Ingredient</label>
                            <select id="menu-ingredient" name="ingredientId" required disabled class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 p-3 text-sm font-body-md cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                                <option value="" disabled selected>Please choose a category first</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-price">Price (IDR)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-outline font-semibold">Rp</span>
                                <input id="menu-price" name="price" required min="0" class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 py-3 pl-12 pr-4 text-sm font-body-md" placeholder="e.g. 35000" type="number"/>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-stock">Stock Quantity</label>
                            <input id="menu-stock" name="stock" required min="0" class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 p-3 text-sm font-body-md" placeholder="e.g. 100" type="number"/>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-description">Product Description</label>
                        <textarea id="menu-description" name="description" rows="3" required class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 p-3 text-sm font-body-md" placeholder="Describe flavor profiles, aroma notes or portion weight details..."></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-label-caps tracking-wider text-primary uppercase font-bold" for="menu-image">Image URL</label>
                        <input id="menu-image" name="imageUrl" class="w-full bg-surface border border-outline-variant rounded-lg focus:border-primary focus:ring-0 p-3 text-sm font-body-md" placeholder="https://images.unsplash.com/..." type="url"/>
                    </div>

                    <div class="sela-line opacity-30 pt-4"></div>

                    <div class="flex justify-end gap-4">
                        <a href="manage-menu.html" class="px-6 py-3 border border-outline text-primary font-label-caps text-xs tracking-widest rounded-lg hover:bg-surface transition-all">Cancel</a>
                        <button type="submit" class="px-8 py-3 bg-primary text-white font-label-caps text-xs tracking-widest rounded-lg hover:opacity-90 active:scale-95 transition-all cursor-pointer shadow-sm">Save Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/admin/edit-menu.js"></script>
</body>
</html>
