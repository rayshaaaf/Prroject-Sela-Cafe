<script>
        const DUMMY_PRODUCTS = [
            {
                id: 1,
                name: "Hazelnut Velvet Latte",
                price: 95000,
                categoryName: "coffee",
                descriptionId: "A smooth blend of our signature espresso with toasted hazelnut essence and micro-foamed milk.",
                imageUrl: "https://images.unsplash.com/photo-1534778101976-62847782c213?q=80&w=600&auto=format&fit=crop",
                isAvailable: true,
                stock: 10
            },
            {
                id: 2,
                name: "Almond Croissant",
                price: 78000,
                categoryName: "pastry",
                descriptionId: "Double-baked pastry filled with rich almond frangipane and topped with toasted slivers.",
                imageUrl: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=600&auto=format&fit=crop",
                isAvailable: true,
                stock: 10
            },
            {
                id: 3,
                name: "Ceremonial Matcha",
                price: 105000,
                categoryName: "tea",
                descriptionId: "Uji-grade matcha whisked with oat milk for a creamy, earthy, and perfectly balanced finish.",
                imageUrl: "https://images.unsplash.com/photo-1536256263959-770b48d82b0a?q=80&w=600&auto=format&fit=crop",
                isAvailable: true,
                stock: 10
            },
            {
                id: 4,
                name: "Signature Flat White",
                price: 82000,
                categoryName: "coffee",
                descriptionId: "A crisp rosetta latte art with perfectly balanced sweetness and a velvety finish.",
                imageUrl: "https://images.unsplash.com/photo-1577968897966-3d4325b36b61?q=80&w=600&auto=format&fit=crop",
                isAvailable: true,
                stock: 10
            },
            {
                id: 5,
                name: "24h Cold Brew",
                price: 98000,
                categoryName: "coffee",
                descriptionId: "Cold brew coffee served with a large clear ice sphere, garnished with dried orange.",
                imageUrl: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?q=80&w=600&auto=format&fit=crop",
                isAvailable: true,
                stock: 10
            },
            {
                id: 6,
                name: "Dark Choc Sea Salt",
                price: 65000,
                categoryName: "dessert",
                descriptionId: "The subtle salt flakes perfectly elevate the dark cocoa notes.",
                imageUrl: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?q=80&w=600&auto=format&fit=crop",
                isAvailable: false,
                stock: 0
            }
        ];

        let basePrice = 95000;
        let currentProduct = null;

        function updatePrice() {
            const catName = (currentProduct?.categoryName || '').toLowerCase();
            const isFood = ['pastry', 'dessert'].includes(catName);
            let calculatedPrice = basePrice;

            if (isFood) {
                const portion = document.querySelector('input[name="food-portion"]:checked')?.value || 'single';
                if (portion === 'share') {
                    calculatedPrice += 15000;
                } else if (portion === 'box') {
                    calculatedPrice += 45000;
                }
                if (document.getElementById('addon-butter')?.checked) {
                    calculatedPrice += 5000;
                }
                if (document.getElementById('addon-jam')?.checked) {
                    calculatedPrice += 5000;
                }
            } else {
                const size = document.querySelector('input[name="size"]:checked')?.value || 'regular';
                if (size === 'small') {
                    calculatedPrice = Math.max(5000, basePrice - 5000);
                } else if (size === 'large') {
                    calculatedPrice = basePrice + 5000;
                }
            }

            const priceEl = document.getElementById('product-price');
            if (priceEl) {
                priceEl.innerText = `Rp ${Number(calculatedPrice).toLocaleString('id-ID')}`;
            }
        }

        // SPA-Style Detail Switching for Zero-Lag Transitions
        function loadMenuDetail(id, pushState = true) {
            if (pushState) {
                const newUrl = `detailmenu.html?id=${id}`;
                window.history.pushState({ id: id }, '', newUrl);
            }

            // Reset quantity selector
            currentQty = 1;
            if (qtyElement) qtyElement.innerText = 1;

            // 1. Tampilkan data dari cache secara instan (agar tidak lag saat ganti menu)
            let product = null;
            const cached = sessionStorage.getItem('all_menus');
            if (cached) {
                try {
                    const all = JSON.parse(cached);
                    const found = all.find(x => x.id == id);
                    if (found) {
                        product = {
                            id: found.id,
                            nameId: found.nameId || found.name,
                            price: found.price,
                            categoryName: found.categoryName || found.category,
                            descriptionId: found.descriptionId || found.description,
                            imageUrl: found.imageUrl,
                            isAvailable: found.isAvailable !== false,
                            stock: found.stock || 10
                        };
                        renderProductPage(product);
                    }
                } catch(e) {}
            }

            // Jika cache kosong ATAU data tidak ditemukan di cache, cari di DUMMY_PRODUCTS secara instan
            if (!product) {
                const dummyProduct = DUMMY_PRODUCTS.find(x => x.id == id);
                if (dummyProduct) {
                    product = {
                        id: dummyProduct.id,
                        nameId: dummyProduct.name,
                        price: dummyProduct.price,
                        categoryName: dummyProduct.categoryName,
                        descriptionId: dummyProduct.descriptionId,
                        imageUrl: dummyProduct.imageUrl,
                        isAvailable: dummyProduct.isAvailable,
                        stock: dummyProduct.stock
                    };
                    renderProductPage(product);
                }
            }

            // Scroll to top smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 2. Fetch background (Stale While Revalidate) untuk update data terbaru
            window.apiFetch('/api/menus/getById/' + id)
                .then(res => {
                    if (res.ok) return res.json();
                })
                .then(apiRes => {
                    if (apiRes && apiRes.success && apiRes.data) {
                        const freshProduct = apiRes.data;
                        if (!product || 
                            product.price !== freshProduct.price || 
                            product.nameId !== freshProduct.nameId ||
                            product.imageUrl !== freshProduct.imageUrl ||
                            product.isAvailable !== freshProduct.isAvailable) {
                            product = freshProduct;
                            renderProductPage(product);
                        }
                    }
                })
                .catch(err => {
                    console.warn('Background update of details failed, using offline fallback.', err);
                });
        }

        // Dynamic Menu Detail Loader
        document.addEventListener('DOMContentLoaded', () => {
            // Bind size change listeners
            document.querySelectorAll('input[name="size"]').forEach(radio => {
                radio.addEventListener('change', updatePrice);
            });
            document.querySelectorAll('input[name="food-portion"]').forEach(radio => {
                radio.addEventListener('change', updatePrice);
            });
            document.getElementById('addon-butter')?.addEventListener('change', updatePrice);
            document.getElementById('addon-jam')?.addEventListener('change', updatePrice);

            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            if (!id) id = '1';

            // Load initial detail
            loadMenuDetail(id, false);
        });

        // Handle browser back/forward buttons (popstate)
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            if (!id) id = '1';
            loadMenuDetail(id, false);
        });

        function renderProductPage(product) {
            currentProduct = product;
            document.title = `Sela Cafe | ${product.nameId || product.nameEn || 'Specialty Blend'}`;
            const img = document.querySelector('section img');
            if (img) {
                img.src = product.imageUrl || 'https://images.unsplash.com/photo-1534778101976-62847782c213?q=80&w=600&auto=format&fit=crop';
                img.alt = product.nameId || product.nameEn || 'Specialty Blend';
            }
            const titleEl = document.querySelector('h1.font-headline-xl');
            if (titleEl) titleEl.innerText = product.nameId || product.nameEn || 'Specialty Blend';
            
            basePrice = product.price || 95000;
            updatePrice();
            
            const descEl = document.querySelector('section p.font-body-lg');
            if (descEl) descEl.innerText = product.descriptionId || product.descriptionEn || 'Handcrafted specialty coffee blend.';

            const isOutOfStock = !product.isAvailable || product.stock <= 0;
            const submitBtn = document.querySelector('button[type="submit"]');
            if (submitBtn) {
                if (isOutOfStock) {
                    submitBtn.innerText = 'Sold Out';
                    submitBtn.disabled = true;
                    submitBtn.classList.replace('bg-deep-espresso', 'opacity-50');
                } else {
                    submitBtn.innerText = 'Add to Ritual';
                    submitBtn.disabled = false;
                    submitBtn.className = "flex-1 bg-deep-espresso text-on-primary font-label-caps text-label-caps tracking-widest py-4 hover:opacity-90 active:scale-95 transition-all";
                }
            }

            // Tampilkan opsi kustomisasi yang sesuai kategori
            const catName = (product.categoryName || product.category || '').toLowerCase();
            const isFood = ['pastry', 'dessert', 'pastri', 'pencuci mulut', 'pencuci_mulut', 'food', 'makanan'].includes(catName);

            if (isFood) {
                document.getElementById('beverage-customization')?.classList.add('hidden');
                document.getElementById('food-customization')?.classList.remove('hidden');
            } else {
                document.getElementById('beverage-customization')?.classList.remove('hidden');
                document.getElementById('food-customization')?.classList.add('hidden');
            }

            // Load dynamic Pairs Well With
            loadPairsWellWith(product);
        }

        // Dynamic Pairs Well With Curation (dengan Caching)
        async function loadPairsWellWith(currentProduct) {
            let products = [];
            
            // Coba ambil dari sessionStorage cache
            const cached = sessionStorage.getItem('all_menus');
            if (cached) {
                try { products = JSON.parse(cached); } catch(e) {}
            }

            // Jika cache kosong, fetch dari API
            if (products.length === 0) {
                try {
                    const res = await window.apiFetch('/api/menus/getAll');
                    if (res.ok) {
                        const apiRes = await res.json();
                        products = apiRes.data || [];
                        sessionStorage.setItem('all_menus', JSON.stringify(products));
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            if (products.length === 0) {
                products = DUMMY_PRODUCTS.map(p => ({
                    id: p.id,
                    nameId: p.name,
                    price: p.price,
                    categoryName: p.categoryName,
                    imageUrl: p.imageUrl
                }));
            }

            const filtered = products.filter(p => Number(p.id) !== Number(currentProduct.id));
            const currentCat = (currentProduct.categoryName || currentProduct.category || '').toLowerCase();
            const isBeverage = ['coffee', 'tea', 'non-coffee', 'kopi', 'teh', 'non-kopi'].includes(currentCat);

            let primaryMatches = [];
            let secondaryMatches = [];

            filtered.forEach(p => {
                const pCat = (p.categoryName || p.category || '').toLowerCase();
                const pIsBeverage = ['coffee', 'tea', 'non-coffee', 'kopi', 'teh', 'non-kopi'].includes(pCat);
                if (isBeverage !== pIsBeverage) {
                    primaryMatches.push(p);
                } else {
                    secondaryMatches.push(p);
                }
            });

            // Acak rekomendasi
            primaryMatches.sort(() => 0.5 - Math.random());
            secondaryMatches.sort(() => 0.5 - Math.random());

            const recommendations = [...primaryMatches, ...secondaryMatches].slice(0, 3);

            const grid = document.getElementById('pairs-well-with-grid');
            if (grid && recommendations.length > 0) {
                grid.innerHTML = recommendations.map(p => {
                    const priceFormatted = 'Rp ' + Number(p.price || 0).toLocaleString('id-ID');
                    const isFood = ['pastry', 'dessert', 'pastri', 'pencuci mulut', 'pencuci_mulut', 'food', 'makanan'].includes((p.categoryName || p.category || '').toLowerCase());
                    const badge = isFood ? "Baker's Choice" : "Brewed Fresh";
                    return `
                    <a href="detailmenu.html?id=${p.id}" onclick="event.preventDefault(); loadMenuDetail(${p.id});" class="flex flex-col gap-6 group cursor-pointer block decoration-none text-on-surface">
                        <div class="aspect-[4/3] overflow-hidden bg-surface-container rounded-lg">
                            <img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" src="${p.imageUrl || 'https://images.unsplash.com/photo-1534778101976-62847782c213?q=80&w=600&auto=format&fit=crop'}" alt="${p.nameId || p.name}"/>
                        </div>
                        <div class="flex flex-col gap-2">
                            <h3 class="font-headline-md text-headline-md text-primary group-hover:underline line-clamp-1">${p.nameId || p.name || 'Artisan Provisions'}</h3>
                            <div class="flex justify-between items-center">
                                <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">${priceFormatted}</span>
                                <span class="font-label-caps text-[10px] px-2 py-1 bg-heritage-cream text-primary rounded-sm">${badge}</span>
                            </div>
                        </div>
                    </a>
                    `;
                }).join('');
            }
        }

        // Quantity Selector Logic
        let currentQty = 1;
        const qtyElement = document.getElementById('qty');

        function increment() {
            currentQty++;
            qtyElement.innerText = currentQty;
        }

        function decrement() {
            if (currentQty > 1) {
                currentQty--;
                qtyElement.innerText = currentQty;
            }
        }

        // Micro-interactions for selections
        document.querySelectorAll('button[type="button"]').forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.parentElement.children.length > 2) { // Logic for button groups
                    Array.from(this.parentElement.children).forEach(b => {
                        b.classList.remove('bg-heritage-cream', 'border-primary', 'text-primary');
                        b.classList.add('bg-surface-bright', 'text-on-surface-variant', 'border-outline-muted');
                    });
                    this.classList.add('bg-heritage-cream', 'border-primary', 'text-primary');
                    this.classList.remove('bg-surface-bright', 'text-on-surface-variant', 'border-outline-muted');
                }
            });
        });

        // Form submission — add to localStorage cart
        document.getElementById('order-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            const qty = parseInt(document.getElementById('qty').innerText) || 1;
            const baseName = document.querySelector('h1.font-headline-xl')?.innerText || 'Menu Item';
            
            const size = document.querySelector('input[name="size"]:checked')?.value || 'regular';
            const sizeLabel = size.charAt(0).toUpperCase() + size.slice(1);
            
            const catName = (currentProduct?.categoryName || '').toLowerCase();
            const isFood = ['pastry', 'dessert', 'pastri', 'pencuci mulut', 'pencuci_mulut', 'food', 'makanan'].includes(catName);
            
            let name;
            if (isFood) {
                const portionVal = document.querySelector('input[name="food-portion"]:checked')?.value || 'single';
                const portionText = portionVal === 'share' ? 'Share Pack' : (portionVal === 'box' ? 'Party Box' : 'Single');
                
                let addons = [];
                if (document.getElementById('addon-butter')?.checked) addons.push('Butter');
                if (document.getElementById('addon-jam')?.checked) addons.push('Jam');
                
                const addonText = addons.length > 0 ? ` + ${addons.join('&')}` : '';
                name = `${baseName} (${portionText}${addonText})`;
            } else {
                name = `${baseName} (${sizeLabel})`;
            }

            const priceText = document.getElementById('product-price')?.innerText || '0';
            const price = parseFloat(priceText.replace(/[^0-9]/g, '')) || 0;
            const imageUrl = document.querySelector('section img')?.src || '';

            const urlParams = new URLSearchParams(window.location.search);
            let productId = Number(urlParams.get('id')) || 1;

            if (typeof window.handleMenuAddToCart === 'function') {
                for (let i = 0; i < qty; i++) {
                    window.handleMenuAddToCart(productId, name, price, imageUrl);
                }
            } else {
                // Fallback: write langsung ke localStorage
                let cart = [];
                try { cart = JSON.parse(localStorage.getItem('cart') || '[]'); } catch(e) { cart = []; }
                const idx = cart.findIndex(item => item.name === name);
                if (idx > -1) {
                    cart[idx].quantity += qty;
                } else {
                    cart.push({ id: productId, name, price, imageUrl, quantity: qty });
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                if (typeof window.showToast === 'function') window.showToast(`${name} added to your bag.`);
            }

            btn.innerText = 'Added ✓';
            btn.disabled = true;
            btn.classList.replace('bg-deep-espresso', 'bg-moss-green');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-moss-green', 'bg-deep-espresso');
                btn.disabled = false;
            }, 2000);
        });
    </script>
</body></html>
