<!-- Right Side: Minimalist Login Form -->
<section class="flex-1 h-full bg-paper-white flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-gutter relative">
<!-- Top Logo/Nav (Suppressed in Shell logic but manually built for this specific Login Flow) -->
<div class="absolute top-12 flex flex-col items-center">
<h1 class="text-headline-md font-headline-md text-primary uppercase tracking-widest mb-2">SELA CAFE</h1>

<div class="text-center md:text-left">

<form class="space-y-6">
<div class="space-y-4">
<div class="group">

<input id="email" class="sela-input w-full bg-transparent border-b border-outline-muted py-3 text-body-md font-body-md transition-all duration-300 placeholder:text-outline-muted" placeholder="name@example.com" type="email"/>
</div>

</div>

</div>

<!-- Floating Atmosphere Elements -->
<script>
        // Subtle micro-interaction for input tracking
        document.querySelectorAll('.sela-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-deep-espresso');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-deep-espresso');
            });
        });

        // Atmospheric parallax effect for image
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 10;
            const y = (e.clientY / window.innerHeight) * 10;
            const img = document.querySelector('section img');
            if(img) {
                img.style.transform = `translate(${-x}px, ${-y}px) scale(1.05)`;
            }
        });
    </script>
