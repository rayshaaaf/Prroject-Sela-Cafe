<!-- Right Side: Compact Register Form -->
<section class="flex-1 h-full bg-paper-white flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-4 relative">
<!-- Form Container -->
<div class="w-full max-w-sm flex flex-col space-y-4">
<!-- Top Logo/Nav -->
<div class="flex flex-col items-center mb-1">
<h1 class="text-headline-md font-headline-md text-primary uppercase tracking-widest mb-1">SELA CAFE</h1>
<div class="w-12 h-[1px] bg-outline-muted"></div>
</div>
<div class="text-center md:text-left">
<h2 class="text-headline-lg-mobile md:text-headline-md font-headline-md text-deep-espresso mb-1">Create Account</h2>
<p class="text-body-md font-body-md text-on-surface-variant/80">Begin your journey with Sela Cafe.</p>
</div>
<form class="space-y-3">
<!-- Full Name -->
<div class="group">
<label class="block text-label-caps font-label-caps text-on-surface-variant/60 mb-0.5 tracking-wider text-[10px]">FULL NAME</label>
<input id="full_name" class="sela-input w-full bg-transparent border-b border-outline-muted py-1.5 text-body-md font-body-md transition-all duration-300 placeholder:text-outline-muted" placeholder="E.g. Julian Vane" type="text"/>
</div>
<!-- Email and Phone -->
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="block text-label-caps font-label-caps text-on-surface-variant/60 mb-0.5 tracking-wider text-[10px]">EMAIL ADDRESS</label>
<input id="email" class="sela-input w-full bg-transparent border-b border-outline-muted py-1.5 text-body-md font-body-md transition-all duration-300 placeholder:text-outline-muted" placeholder="julian@sela.com" type="email"/>
</div>
<div class="group">
<label class="block text-label-caps font-label-caps text-on-surface-variant/60 mb-0.5 tracking-wider text-[10px]">PHONE NUMBER</label>
<input id="phone" class="sela-input w-full bg-transparent border-b border-outline-muted py-1.5 text-body-md font-body-md transition-all duration-300 placeholder:text-outline-muted" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password and Confirm Password -->
<div class="grid grid-cols-2 gap-4">
<div class="group relative">
<label class="block text-label-caps font-label-caps text-on-surface-variant/60 mb-0.5 tracking-wider text-[10px]">PASSWORD</label>
<input id="password" class="sela-input w-full bg-transparent border-b border-outline-muted py-1.5 pr-8 text-body-md font-body-md transition-all duration-300 placeholder:text-outline-muted" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-1.5 text-on-surface-variant/60 hover:text-primary transition-colors" type="button" id="toggle-password-btn">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
<div class="group">
<label class="block text-label-caps font-label-caps text-on-surface-variant/60 mb-0.5 tracking-wider text-[10px]">CONFIRM PASSWORD</label>
<input id="confirm_password" class="sela-input w-full bg-transparent border-b border-outline-muted py-1.5 text-body-md font-body-md transition-all duration-300 placeholder:text-outline-muted" placeholder="••••••••" type="password"/>
</div>
</div>

<input class="w-4 h-4 rounded-none border-outline-muted text-deep-espresso focus:ring-0 cursor-pointer" id="terms" type="checkbox"/>
<label class="text-[12px] font-label-md text-on-surface-variant cursor-pointer" for="terms">
I agree to the <a class="underline decoration-outline-muted hover:decoration-primary transition-all" href="#">Terms</a> &amp; <a class="underline decoration-outline-muted hover:decoration-primary transition-all" href="#">Privacy</a>.
</label>

                        CREATE ACCOUNT
                    </button>

<script>
        // Subtle micro-interaction for input tracking
        document.querySelectorAll('.sela-input').forEach(input => {
            input.addEventListener('focus', () => {
                const label = input.parentElement.querySelector('label');
                if (label) label.classList.add('text-deep-espresso');
            });
            input.addEventListener('blur', () => {
                const label = input.parentElement.querySelector('label');
                if (label) label.classList.remove('text-deep-espresso');
            });
        });

        // Simple visibility toggle logic
        const toggleBtn = document.getElementById('toggle-password-btn');
        const passInput = document.getElementById('password');
        if (toggleBtn && passInput) {
            toggleBtn.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                toggleBtn.innerHTML = `<span class="material-symbols-outlined text-[18px]">${type === 'password' ? 'visibility' : 'visibility_off'}</span>`;
            });
        }

        // Atmospheric parallax effect for image
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 10;
            const y = (e.clientY / window.innerHeight) * 10;
            const img = document.querySelector('section img');
            if(img) {
                img.style.transform = `translate(${-x}px, ${-y}px) scale(1.05)`;
            }
        });
    </script>
